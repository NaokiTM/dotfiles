[colors]
background = #07293C
background-alt = #02405f
foreground = #FFFFFF
primary = #00BBFF
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bar1]
width = 100%
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 11pt
border-color = #00000000

padding-left = 0

;separator = |
separator-foreground = ${colors.disabled}

font-0 = Fira-Sans:size=10;2
font-1 = Fira-Sans:style=Bold:size=12;2

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio battery xkeyboard memory cpu wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
;label-active-background = ${colors.background-alt}
label-active-background = #009493
;label-active-underline= #FFFFFF
label-active-padding = 4

label-occupied = %name%
label-occupied-padding = 4
label-occupied-background = #006982

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 4

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 4


[module/xwindow]
label-foreground = #FFFFFF
format-background = #02405f
format-padding = 4
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#FFFFFF}Storage Used(%mountpoint%): %percentage_used%%
label-mounted-background = #023F5E
label-mounted-padding = 4

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
label-unmounted-background = #023F5E
label-unmounted-padding = 4

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Volume "
;format-volume-prefix-foreground = ${colors.primary}
format-volume-prefix-foreground = #FFFFFF
format-volume = <label-volume>
format-volume-background = #005473
format-volume-padding = 4

label-volume = %percentage%%

label-muted = muted
;label-muted-foreground = ${colors.disabled}
format-prefix-foreground = #FFFFFF
label-muted-background = #005473
label-muted-padding = 4


;[module/xkeyboard]
;type = internal/xkeyboard
;blacklist-0 = num lock
;
;label-layout = %layout%
;label-layout-foreground = ${colors.primary}
;
;label-indicator-padding = 2
;label-indicator-margin = 1
;label-indicator-foreground = ${colors.background}
;label-indicator-background = ${colors.secondary}

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 100

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 10

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5
; Basic format when battery is charging, discharging, or full
format-charging-background = #005F7B
format-charging-padding = 4

format-discharging-background = #005F7B
format-discharging-padding = 4

format-full-background = #005F7B
format-full-padding = 4

; Example labels
label-charging = Battery %percentage%% (charging)
label-discharging = Battery %percentage%% (discharging)
label-full = Battery Full



[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
;format-prefix-foreground = ${colors.primary}
format-prefix-foreground = #FFFFFF
label = %percentage_used:2%%
format-padding = 4
format-background = #006982

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
;format-prefix-foreground = ${colors.primary}
format-prefix-foreground = #FFFFFF
label = %percentage:2%%
format-background = #007e8c
format-padding = 4

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#FFFFFF}%ifname%%{F#FFFFFF} disconnected
format-connected-padding = 4
format-disconnected-padding = 4
format-connected-background = #009493
format-disconnected-background = #009493

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#FFFFFF}%ifname%%{F-} %essid% %local_ip% 
format-background = #009493

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#00BBFF}%ifname%%{F-} %local_ip%
format-background = #005473
format-padding = 2

[module/date]
type = internal/date
interval = 1
format-background = #00B3AF
format-padding = 4
format-font = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-font = 1
;label-foreground = ${colors.primary}
label-foreground = #000000

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

;#00B3AF date
;#005473 ethernet
;#009493 wlan
;#007e8c
;#006982
;#005F7B
